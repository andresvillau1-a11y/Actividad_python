<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Productos</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f8fafc; /* Fondo gris claro ultra moderno */
      color: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ── Contenedor Estilizado ── */
    .form-container {
      background: #ffffff;
      width: 100%;
      max-width: 420px;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
      border: 1px solid #f1f5f9;
    }

    /* ── Encabezado ── */
    .form-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .form-header h3 {
      font-size: 20px;
      font-weight: 700;
      color: #1e293b;
      letter-spacing: -0.02em;
    }
    .btn-close {
      background: #f1f5f9;
      border: none;
      color: #64748b;
      font-size: 14px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-close:hover { 
      background: #e2e8f0;
      color: #0f172a;
    }

    /* ── Campos de Entrada ── */
    .field {
      margin-bottom: 20px;
    }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #475569;
      margin-bottom: 6px;
    }
    .field input, .field select {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #cbd5e1;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      color: #0f172a;
      outline: none;
      background-color: #fff;
      transition: all 0.2s ease;
    }
    
    /* Efecto Focus más estético */
    .field input:focus, .field select:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
    }

    /* Placeholder más sutil */
    .field input::placeholder {
      color: #94a3b8;
    }

    /* ── Botón Guardar ── */
    .btn-save {
      width: 100%;
      padding: 13px;
      background: #2563eb;
      color: #ffffff;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 10px;
      box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
    }
    .btn-save:hover { 
      background: #1d4ed8;
      box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
      transform: translateY(-1px);
    }
    .btn-save:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body>

  <div class="form-container">
    <!-- Encabezado del Formulario -->
    <div class="form-header">
      <h3>Registro de Productos</h3>
      <button class="btn-close">✕</button>
    </div>

    <!-- Formulario -->
    <div class="field">
      <label>Código</label>
      <input type="text" id="f-codigo" placeholder="Ej: P005">
    </div>
    
    <div class="field">
      <label>Nombre</label>
      <input type="text" id="f-nombre" placeholder="Nombre del producto">
    </div>
    
    <div class="field">
      <label>Precio</label>
      <input type="number" id="f-precio" placeholder="0">
    </div>
    
    <div class="field">
      <label>Categoría</label>
      <select id="f-categoria">
        <option value="">Seleccionar categoría</option>
        <option value="Computadores">Computadores</option>
        <option value="Accesorios">Accesorios</option>
        <option value="Monitores">Monitores</option>
        <option value="Periféricos">Periféricos</option>
        <option value="Almacenamiento">Almacenamiento</option>
      </select>
    </div>

    <button class="btn-save" onclick="guardarProducto()">Guardar Producto</button>
  </div>

  <script>
    function guardarProducto() {
      const codigo = document.getElementById('f-codigo').value;
      const nombre = document.getElementById('f-nombre').value;
      const precio = document.getElementById('f-precio').value;
      const categoria = document.getElementById('f-categoria').value;

      console.log({ codigo, nombre, precio, categoria });
    }
  </script>

</body>
</html>
